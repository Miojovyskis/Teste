<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragmentos da Noite</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top, #120a1f, #05050a);
  color: #e3d9f2;
  overflow-x: hidden;
}

/* 🌫️ NÉVOA REAL (AGORA VISÍVEL) */
.fog {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  filter: blur(40px);
  opacity: 0.35;
  animation: fogMove 25s ease-in-out infinite;
}

.fog1 {
  background: radial-gradient(circle at 30% 40%, rgba(200,200,255,0.25), transparent 60%);
}

.fog2 {
  background: radial-gradient(circle at 70% 60%, rgba(150,120,255,0.20), transparent 60%);
  animation-duration: 40s;
  opacity: 0.25;
}

.fog3 {
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 70%);
  animation-duration: 60s;
  opacity: 0.18;
}

@keyframes fogMove {
  0% { transform: translateX(-5%) translateY(0); }
  50% { transform: translateX(5%) translateY(-3%); }
  100% { transform: translateX(-5%) translateY(0); }
}

/* 🌟 VAGALUMES (AGORA VISÍVEIS) */
.firefly {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(255, 240, 140, 1);
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(255, 230, 120, 1);
  animation: floatFirefly linear infinite, glow 2s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatFirefly {
  0% { transform: translateY(110vh) translateX(0); }
  100% { transform: translateY(-10vh) translateX(60px); }
}

@keyframes glow {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(2); }
}

/* 📄 CONTEÚDO */
header, main, footer {
  position: relative;
  z-index: 2;
}

header {
  text-align: center;
  padding: 40px;
}

header h1 {
  color: #b08cff;
  font-size: 3rem;
}

/* POSTS */
main {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.post {
  display: flex;
  margin-bottom: 50px;
  background: rgba(0,0,0,0.6);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(176,140,255,0.25);
}

/* 🔥 IMAGENS MAIORES (esticadas verticalmente) */
.post img {
  width: 50%;
  height: 420px;
  object-fit: cover;
}

.text {
  width: 50%;
  padding: 25px;
  white-space: pre-line;
}

h2 {
  color: #b08cff;
}

/* MOBILE */
@media(max-width:768px){
  .post {
    flex-direction: column;
  }

  .post img {
    width: 100%;
    height: 300px;
  }

  .text {
    width: 100%;
  }
}

/* 🎧 ÁUDIO */
audio { display:none; }

/* START */
#start {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#start button {
  padding: 15px 25px;
  font-size: 18px;
  background: #b08cff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🌫️ NÉVOA -->
<div class="fog fog1"></div>
<div class="fog fog2"></div>
<div class="fog fog3"></div>

<!-- 🎧 MÚSICA -->
<audio id="music" loop>
  <source src="ambient.mp3" type="audio/mpeg">
</audio>

<!-- 🚪 START -->
<div id="start">
  <button onclick="startSite()">Entrar no Fragmento</button>
</div>

<script>
function startSite(){
  document.getElementById("start").style.display = "none";
  const music = document.getElementById("music");
  music.volume = 0.4;
  music.play().catch(()=>{});
}
</script>

<!-- 🌟 VAGALUMES FORÇADOS -->
<script>
const count = 35;

for(let i = 0; i < count; i++){
  const f = document.createElement("div");
  f.className = "firefly";

  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (5 + Math.random() * 10) + "s";
  f.style.animationDelay = Math.random() * 5 + "s";

  document.body.appendChild(f);
}
</script>

<header>
  <h1>Fragmentos da Noite</h1>
</header>

<main>

<div class="post">
  <img src="111.png">
  <div class="text">
<h2>O Caminho de Volta a Ti</h2>
Diante ao pesadelo, eu sinto o teu cheiro...
  </div>
</div>

<div class="post">
  <img src="222.png">
  <div class="text">
<h2>Primavera em Mim</h2>
Ao deitar à noite, penso em ti...
  </div>
</div>

<div class="post">
  <img src="333.png">
  <div class="text">
<h2>Alinhar das Incertezas</h2>
E então os sentimentos se despelam...
  </div>
</div>

<div class="post">
  <img src="444.png">
  <div class="text">
<h2>O Altar Onde Me Encontro</h2>
Me livrando dos meus tormentos...
  </div>
</div>

</main>

</body>
</html>
